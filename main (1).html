<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHWE YI MOE FABRIC</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: #0b0b0b;
    color: #eee;
}

/* HEADER */
header {
    text-align: center;
    padding: 40px 20px;
    border-bottom: 1px solid #222;
}

/* ပုံကို လေးထောင့်ကျကျ၊ အလယ်ဗဟိုပြု၊ သပ်သပ်ရပ်ရပ် */
header img {
    width: 100%;
    max-width: 550px;
    height: auto;
    aspect-ratio: 4 / 3;  /* လေးထောင့်ပုံစံ (အကျယ်:အမြင့်=4:3) */
    object-fit: cover;
    border-radius: 12px;   /* နည်းနည်းလေးထောင့်ချိုးထားတယ် (သပ်ရပ်အောင်) */
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    margin-bottom: 20px;
    display: block;
    margin-left: auto;
    margin-right: auto;
}

header h1 {
    letter-spacing: 4px;
    font-weight: 300;
    margin-top: 10px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 80px 20px;
}

.hero h2 {
    font-size: 38px;
    letter-spacing: 3px;
}

.hero p {
    color: #aaa;
}

/* BUTTON */
.btn {
    margin-top: 30px;
    display: inline-block;
    padding: 12px 25px;
    border: 1px solid #555;
    color: #fff;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: white;
    color: black;
}

/* SOCIAL */
.social {
    text-align: center;
    padding: 40px;
}

.social a {
    display: inline-block;
    margin: 10px;
    font-size: 18px;
    color: #ccc;
    border: 1px solid #444;
    padding: 12px;
    border-radius: 50%;
    transition: 0.3s;
}

.social a:hover {
    background: white;
    color: black;
}

/* POPUP (CONTACT US) */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup {
    background: #111;
    padding: 40px;
    width: 300px;
    text-align: center;
    border: 1px solid #333;
    position: relative;
}

.popup h3 {
    margin-bottom: 20px;
    letter-spacing: 2px;
}

.popup p {
    color: #bbb;
    margin: 10px 0;
}

.close {
    position: absolute;
    top: 10px;
    right: 15px;
    cursor: pointer;
    color: #aaa;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 30px;
    border-top: 1px solid #222;
    color: #666;
    font-size: 12px;
}
</style>

</head>
<body>

<!-- HEADER -->
<header>
    <img src="/image/a.jpg" alt="SHWE YI MOE FABRIC">
    <h1>SHWE YI MOE FABRIC</h1>
</header>

<!-- HERO -->
<section class="hero">
    <h2>CLASSIC FABRIC COLLECTION</h2>
    <p>Elegant • Timeless • Premium Quality</p>

    <div class="btn" onclick="openPopup()">
        Contact Us
    </div>
</section>

<!-- SOCIAL ICONS -->
<div class="social">
    <a href="https://www.facebook.com/share/1B6Cdqw1MJ/" target="_blank">
        <i class="fab fa-facebook-f"></i>
    </a>

    <a href="https://www.tiktok.com/@shweyimoefabricygn?_r=1&_t=ZS-95daYpXWAFD" target="_blank">
        <i class="fab fa-tiktok"></i>
    </a>

    </a>
</div>

<!-- CONTACT POPUP -->
<div class="overlay" id="popup">
    <div class="popup">
        <span class="close" onclick="closePopup()">✖</span>
        <h3>Contact Us</h3>
        <p>09-777056616</p>
        <p>Facebook / Messenger</p>
        <p>TikTok / Viber</p>
    </div>
</div>

<!-- FOOTER -->
<footer>
    © 2026 SHWE YI MOE FABRIC
    <hr>
    Developer by HeinMinKhant All right received
</footer>

<script>
function openPopup(){
    document.getElementById("popup").style.display = "flex";
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
